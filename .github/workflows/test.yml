name: Tests

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit tests + client compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared and server tests
        run: ./gradlew :shared:jvmTest :server:test

      - name: Compile Android client
        run: ./gradlew :composeApp:compileDebugKotlinAndroid

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            shared/build/reports/tests/
            server/build/reports/tests/
          retention-days: 7
