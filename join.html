<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join my Literature game</title>
  <!-- When the app is installed and the App Link is verified, Android opens the app
       directly and this page is never shown. Non-installers (and unverified cases)
       land here: "Open in app" tries the custom scheme; the Play button is the funnel. -->
  <style>
    :root {
      --bg: #14342b;
      --card: #1d4439;
      --accent: #f2c14e;
      --text: #f5f5f0;
      --muted: #b9c7c0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: radial-gradient(circle at 50% 0%, #1d4439 0%, #0f261f 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .suits { font-size: 30px; letter-spacing: 8px; color: var(--accent); }
    h1 { font-size: 26px; margin: 18px 0 6px; }
    p.sub { color: var(--muted); margin: 0 0 24px; font-size: 15px; }
    .roomlabel { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .room {
      font-size: 40px; font-weight: 800; letter-spacing: 6px;
      color: var(--accent); margin: 4px 0 28px;
    }
    a.btn {
      display: block; text-decoration: none; font-weight: 700; font-size: 16px;
      padding: 15px; border-radius: 14px; margin: 12px 0;
    }
    a.primary { background: var(--accent); color: #14342b; }
    a.secondary { background: transparent; color: var(--text); border: 1px solid rgba(255,255,255,0.25); }
    .hint { color: var(--muted); font-size: 13px; margin-top: 18px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="suits">&spades; &hearts; &diams; &clubs;</div>
    <h1>You're invited!</h1>
    <p class="sub">Join a game of Literature, the classic card game.</p>

    <div class="roomlabel">Room code</div>
    <div class="room" id="room">------</div>

    <a class="btn primary" id="play"
       href="https://play.google.com/store/apps/details?id=com.cards.game.literature">
      Get it on Google Play
    </a>
    <a class="btn secondary" id="openApp" href="#">Open in app</a>

    <p class="hint">Already have the app? Tap “Open in app”. New here? Install from
      Google Play, then re-open this link to jump into the room.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var raw = (params.get("room") || "").trim().toUpperCase();
      var valid = /^[A-Z0-9]{6}$/.test(raw);
      var code = valid ? raw : "";

      if (code) {
        document.getElementById("room").textContent = code;
        // Custom-scheme fallback for "Open in app" (chat apps that strip https links,
        // or devices where the App Link isn't verified).
        document.getElementById("openApp").setAttribute(
          "href", "literature://join?room=" + encodeURIComponent(code)
        );
        // Carry the room code as an install referrer for a future auto-join enhancement.
        document.getElementById("play").setAttribute(
          "href",
          "https://play.google.com/store/apps/details?id=com.cards.game.literature" +
          "&referrer=" + encodeURIComponent("room=" + code)
        );
      } else {
        document.getElementById("room").textContent = "—";
        document.getElementById("openApp").style.display = "none";
      }
    })();
  </script>
</body>
</html>
